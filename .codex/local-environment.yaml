name: default
setup:
  - npm install
  - npm run hooks:install || true

actions:
  install_hooks:
    run: npm run hooks:install
  verify:
    run: npm run verify
  verify_ideas:
    run: npm run verify:ideas
  verify_docs:
    run: npm run verify:docs
  verify_execplan:
    run: npm run verify:execplan
  test_git_hooks:
    run: npm run test:git-hooks
  refresh_knowledge:
    run: npm run knowledge:refresh
  suggest_doc_updates:
    run: npm run knowledge:suggest
  test_eval_smoke:
    run: npm run test:eval-smoke
  test_voice_smoke:
    run: npm run test:voice-smoke
  capture_screencast:
    run: npm run capture:screencast -- --output artifacts/screencasts/manual-capture.mp4
